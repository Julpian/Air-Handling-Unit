<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Dokumen</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --success: #059669;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            padding: 15px;
        }

        .card {
            width: 100%;
            max-width: 360px; /* Diperkecil dari 440px */
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .header {
            padding: 24px 24px 12px;
            text-align: center;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f0fdf4;
            color: var(--success);
            padding: 6px 12px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 12px;
            border: 1px solid #dcfce7;
        }

        .title {
            color: var(--primary);
            font-size: 17px; /* Diperkecil */
            font-weight: 700;
        }

        .content { padding: 0 24px 20px; }

        .info-grid { display: grid; gap: 16px; margin: 20px 0; }

        .info-item { display: flex; gap: 12px; align-items: flex-start; }

        .icon-box {
            width: 34px; height: 34px;
            background: #f8fafc;
            border-radius: 10px;
            display: flex;
            align-items: center; justify-content: center;
            color: var(--accent);
            flex-shrink: 0;
        }

        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 2px;
        }

        .value {
            font-size: 13px; /* Diperkecil */
            color: var(--text-main);
            font-weight: 600;
            line-height: 1.3;
            word-break: break-all; /* Agar UUID panjang tidak merusak layout */
        }

        .time { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; }

        .divider { height: 1px; background: #f1f5f9; margin: 4px 0; }

        .actions { padding: 0 24px 24px; }

        .button {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }

        .status-badge.danger {
            background: #fef2f2;
            color: #dc2626;
            border-color: #fecaca;
        }

        .button:active { transform: scale(0.98); }

        .footer {
            text-align: center;
            padding: 16px;
            background: #f8fafc;
            border-top: 1px solid #f1f5f9;
        }

        .footer-text { font-size: 11px; color: var(--text-muted); }
        .footer-brand { font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="status-badge {{if not .integrity}}danger{{end}}">
            <i data-lucide="{{if .integrity}}shield-check{{else}}shield-alert{{end}}" size="14"></i>
        </div>
        <h1 class="title">Verifikasi Dokumen</h1>
    </div>

    <div class="content">
        <div class="info-grid">
            <div class="info-item">
                <div class="icon-box"><i data-lucide="calendar" size="18"></i></div>
                <div class="info-text">
                    <div class="label">Jadwal Inspeksi AHU</div>
                    <div class="value">{{.year}}</div>
                </div>
            </div>

            <div class="divider"></div>

            <div class="info-item">
                <div class="icon-box"><i data-lucide="user-check" size="18"></i></div>
                <div class="info-text">
                    <div class="label">SVP Approval</div>
                    <div class="value">{{.svp}}</div>
                    <span class="time">{{.svp_time}}</span>
                </div>
            </div>

            <div class="divider"></div>

            <div class="info-item">
                <div class="icon-box"><i data-lucide="user-check" size="18"></i></div>
                <div class="info-text">
                    <div class="label">ASMEN Approval</div>
                    <div class="value">{{.asmen}}</div>
                    <span class="time">{{.asmen_time}}</span>
                </div>
            </div>
            <div class="divider"></div>

            <div class="info-item">
                <div class="icon-box">
                    <i data-lucide="fingerprint" size="18"></i>
                </div>

                <div class="info-text">
                    <div class="label">Document Integrity</div>

                    {{if .integrity}}
                        <div class="value" style="color:#059669">
                            ✅ DOCUMENT INTACT
                        </div>
                    {{else}}
                        <div class="value" style="color:#dc2626">
                            ❌ DOCUMENT MODIFIED
                        </div>
                    {{end}}

                    <span class="time" style="font-size:10px">
                        SHA256:<br>{{.hash}}
                    </span>
                </div>
            </div>
        </div>
    </div>

    <div class="actions">
        <a href="/{{.pdf}}" target="_blank" class="button">
            <i data-lucide="download" size="18"></i> Unduh PDF
        </a>
    </div>

    <div class="footer">
        <p class="footer-text">
            Generated by <span class="footer-brand">AIRA System</span> &copy; 2026
        </p>
    </div>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
